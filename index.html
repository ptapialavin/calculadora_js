<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora_js</title>
</head>
<body>
    <div class="card">
        <img class="product-img" src="./assets/img/pcgamer_amd.jpg" alt="Laptop Gamer AMD">
        
        <div class="title">Laptop Gamer AMD</div>
        
        <div class="price-section">
            Precio base: $<span id="precio-base">400000</span>
        </div>
        
        <div class="controls-section">
            <span>Cantidad: <span id="cantidad">0</span></span>
            <button class="btn" id="btn-aumentar">+</button>
            <button class="btn" id="btn-disminuir">-</button>
        </div>

        <div class="total-section">
            <strong>Total a pagar: $<span id="total-pagar">0</span></strong>
        </div>
    </div>
<script src="./assets/js/base.js"></script>
</body>
</html>
